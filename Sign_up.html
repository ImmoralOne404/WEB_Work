<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
</head>
<body>
    <img src="BMS_logo.png" width="200">
    <div>
        <form>
            <h3>sign up</h3>
            <lable for="nameinput">Enter your Name: </lable>
            <input id="nameinput" type="text" placeholder="Name" required>
            <br> <br>
            <label for="genderinput">Gender</label>
            <input id="genderinput" type="radio" required> <button value="Male">Male</button>
            <button value="Female">Female</button>
            <button value="Prefer not to say">Prefer not to say</button>
            <br><br>

            <lable for="emailinput">Enter your E-mail</lable>
            <input id="emailinput" type="email" placeholder="E-mail" required>
            <br> <br>
            <label for="passwordinput">Password</label>
            <input id="passwordinput" placeholder="Valid Password" required>
            <br> <br>
            <label for="cpasswordinput">Confirm Password</label>
            <input id="cpasswordinput" placeholder="Confirm Password" required>
            <br> <br>

            <lable for="selectinput">City</lable>
            <select id="selectinput">
                <option>Select</option>
                <option value="Lucknow">Lucknow</option>
                <option value="Kanpur">Kanpur</option>
            </select>
            
        </form>
    </div>
</body>
</html>
